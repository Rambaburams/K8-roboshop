apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---

apiVersion: apps/v1
kind: Deployment 
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
spec: 
  replicas: 1
  selector: 
    matchLabels:
      project: roboshop
      name: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        name: catalogue
    spec:
      containers:
        - name: catalogue
          image: joindevops/catalogue:v1
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: catalogue
          ports: 
          - containerPort: 8080

--- 
apiVersion: v1
kind: Service 
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector: 
    project: roboshop
    name: catalogue

  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port
