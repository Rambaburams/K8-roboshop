apiVersion: v1 
kind: ConfigMap 
metadata: 
  name: shipping
  namespace: roboshop
data: 
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"

---
apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    component: shipping
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: shipping
      tier: db 
  template:
    metadata:
      project: roboshop
      component: shipping
      tier: backend
    spec:
      containers:
      - name: shipping
        image: joindevops/shipping:v1
        imagePullPolicy: Always
        envFrom:
        - configMapFef:
            name: shipping
        ports:
        - containerPort: 8080

---
apiVersion: v1 
kind: Service 
metadata: 
  name: shipping
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: shipping
    tier: backend
  ports:
  - prtocol: TCP 
    port: 8080
    targetPort: 8080

