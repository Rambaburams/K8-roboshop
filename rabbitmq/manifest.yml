apiVersion: apps/v1
kind: Deployment 
metadata:
  name: rabbitmq
  namespace: roboshop
spec:
  replicas: 1
  selector:
  matchLabels:
    project: roboshop
    component: rabbitmq
    tier: db 
  template:
    metadata:
      labels:
        project: roboshop
        component: rabbitmq
        tier: db 
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq
          imagePullPolicy: Always
          env: 
          - name: RABBITMQ_DEFAULT_USER
            value: roboshop
          - name: RABBITMQ_DEFAULT_PASS
            value: roboshop123
            port:
            - containerPort: 5672
--- 
apiVersion: v1 
kind: Service 
metadata:
  name: rabbitmq
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: rabbitmq
    tier: db 
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672

